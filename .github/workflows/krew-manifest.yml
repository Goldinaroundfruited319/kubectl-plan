name: Update Krew Manifest

on:
  release:
    types: [published]

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download checksums
        run: |
          TAG="${{ github.event.release.tag_name }}"
          curl -fsSL "https://github.com/samaasi/kubectl-plan/releases/download/${TAG}/kubectl-plan_${TAG#v}_checksums.txt" -o checksums.txt
          cat checksums.txt

      - name: Update plan.yaml
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          get_sha() {
            grep "$1" checksums.txt | awk '{print $1}'
          }

          sed -i \
            -e "s|version: \"v.*\"|version: \"${TAG}\"|g" \
            -e "s|/download/v[^/]*/|/download/${TAG}/|g" \
            -e "s|kubectl-plan_${VERSION}_checksums.txt||g" \
            plan.yaml

          # Replace each platform SHA
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64 windows_amd64 windows_arm64; do
            ext="tar.gz"
            [[ "$platform" == windows* ]] && ext="zip"
            sha=$(grep "kubectl-plan_${platform}.${ext}" checksums.txt | awk '{print $1}')
            sed -i "s|PLACEHOLDER_${platform}|${sha}|g" plan.yaml
          done

          cat plan.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plan.yaml
          git diff --cached --quiet || git commit -m "chore: update krew manifest to ${{ github.event.release.tag_name }}"
          git push
